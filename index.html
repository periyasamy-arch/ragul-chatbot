<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Career Assistant</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f6f8;
  color: #333;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.card {
  background: white;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button {
  padding: 10px 15px;
  border: none;
  background: #2c3e50;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #1a252f;
}

#chatbox {
  height: 250px;
  overflow-y: auto;
  border: 1px solid #ddd;
  padding: 10px;
  margin-bottom: 10px;
  background: #fafafa;
}

.user {
  text-align: right;
  margin: 5px 0;
}

.ai {
  text-align: left;
  margin: 5px 0;
}

pre {
  background: #f4f4f4;
  padding: 10px;
  overflow-x: auto;
}
</style>
</head>

<body>
<div class="container">
<h1>AI Career Assistant</h1>

<!-- Chat -->
<div class="card">
<h3>Chat</h3>
<div id="chatbox"></div>
<input id="chatInput" placeholder="Ask your question">
<button onclick="sendMessage()">Send</button>
</div>

<!-- Resume Generator -->
<div class="card">
<h3>Generate Resume</h3>
<input id="name" placeholder="Name">
<input id="skills" placeholder="Skills">
<input id="experience" placeholder="Experience">
<input id="education" placeholder="Education">
<button onclick="generateResume()">Generate Resume</button>
<button onclick="downloadResume()">Download</button>
</div>

<!-- Upload -->
<div class="card">
<h3>Analyze Resume</h3>
<input type="file" id="file">
<button onclick="uploadResume()">Analyze</button>
<pre id="result"></pre>
</div>

<!-- Interview -->
<div class="card">
<h3>Interview Practice</h3>
<input id="role" placeholder="Role (e.g Software Engineer)">
<button onclick="startInterview()">Start Interview</button>
<pre id="interviewOutput"></pre>
</div>

<!-- Chart -->
<div class="card">
<h3>Resume Score</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>
const API_URL = "https://chatbot-4j8o.onrender.com"

// Chat
async function sendMessage() {
  const input = document.getElementById("chatInput").value;
  if (!input) return;

  const chatbox = document.getElementById("chatbox");
  chatbox.innerHTML += `<div class="user">${input}</div>`;

  const res = await fetch(`${API_URL}/chat`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: input, user_id: "user1"})
  });

  const data = await res.json();
  chatbox.innerHTML += `<div class="ai">${data.reply}</div>`;
}

// Resume
async function generateResume() {
  await fetch(`${API_URL}/generate-resume`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
        name: document.getElementById("name").value,
        skills: document.getElementById("skills").value,
        experience: document.getElementById("experience").value,
        education: document.getElementById("education").value
    })
  });
  alert("Resume generated");
}

function downloadResume() {
  window.open(`${API_URL}/download`);
}

// Upload
async function uploadResume() {
  const fileInput = document.getElementById("file");
  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  const res = await fetch(`${API_URL}/upload-resume`, {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  document.getElementById("result").innerText = data.analysis;

  try {
    const parsed = JSON.parse(data.analysis);
    showChart(parsed);
  } catch {}
}

// Chart
function showChart(data) {
  new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["Skills", "Experience", "Formatting"],
      datasets: [{
        label: "Score",
        data: [data.skills, data.experience, data.formatting]
      }]
    }
  });
}

// Interview
async function startInterview() {
  const role = document.getElementById("role").value;

  const res = await fetch(`${API_URL}/interview`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({role})
  });

  const data = await res.json();
  document.getElementById("interviewOutput").innerText = data.response;
}
</script>

</body>
</html>
